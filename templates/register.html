{% extends "base.html" %}
{% block title %}Create account — Meet You There Foundation{% endblock %}

{% block content %}
<section class="auth">
  <div class="container">
    <form class="auth__card" method="post" action="{{ url_for('register') }}" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <a class="brand" href="{{ url_for('home') }}" style="text-decoration:none;">
        {% include "_logo.svg" %}
      </a>
      <h1>Create your account</h1>
      <p class="sub">Join the member area to access protected resources.</p>

      <div class="field">
        <label for="name">Full name <span class="req" aria-hidden="true">*</span></label>
        <input type="text" id="name" name="name" autocomplete="name" required value="{{ name or '' }}" placeholder="First and last name">
      </div>

      <div class="field">
        <label for="email">Email <span class="req" aria-hidden="true">*</span></label>
        <input type="email" id="email" name="email" autocomplete="email" required value="{{ email or '' }}" placeholder="you@example.com">
      </div>

      <div class="field">
        <label for="password">Password <span class="req" aria-hidden="true">*</span></label>
        <div class="pw-wrap">
          <input type="password" id="password" name="password" autocomplete="new-password" required placeholder="At least 8 characters">
          <button type="button" class="pw-toggle" data-toggle-pw="password" aria-label="Show password">Show</button>
        </div>
        <p class="field__hint">Use at least 8 characters.</p>
      </div>

      <div class="field">
        <label for="confirm">Confirm password <span class="req" aria-hidden="true">*</span></label>
        <input type="password" id="confirm" name="confirm" autocomplete="new-password" required placeholder="Re-enter your password">
      </div>

      <button type="submit" class="btn btn--primary btn--block btn--lg">Create account</button>

      <p class="auth__alt">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
    </form>
  </div>
</section>
{% endblock %}

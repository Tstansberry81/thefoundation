{% extends "base.html" %}
{% block title %}Forgot password — Meet You There Foundation{% endblock %}

{% block content %}
<section class="auth">
  <div class="container">
    <form class="auth__card" method="post" action="{{ url_for('forgot_password') }}" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <a class="brand" href="{{ url_for('home') }}" style="text-decoration:none;">
        {% include "_logo.svg" %}
      </a>
      <h1>Reset your password</h1>
      <p class="sub">Enter your email and we'll send you a link to choose a new password.</p>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required maxlength="255" placeholder="you@example.com">
      </div>

      <button type="submit" class="btn btn--primary btn--block btn--lg">Send reset link</button>

      <p class="auth__alt">Remembered it? <a href="{{ url_for('login') }}">Sign in</a></p>
    </form>
  </div>
</section>
{% endblock %}

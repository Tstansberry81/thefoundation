{% extends "base.html" %}
{% block title %}Log in — Meet You There Foundation{% endblock %}

{% block content %}
<section class="auth">
  <div class="container">
    <form class="auth__card" method="post" action="{{ url_for('login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}" novalidate>
      <a class="brand" href="{{ url_for('home') }}" style="text-decoration:none;">
        {% include "_logo.svg" %}
      </a>
      <h1>Welcome back</h1>
      <p class="sub">Sign in to access member resources.</p>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required placeholder="you@example.com">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="Your password">
          <button type="button" class="pw-toggle" data-toggle-pw="password" aria-label="Show password">Show</button>
        </div>
      </div>

      <div class="field-row">
        <label class="check">
          <input type="checkbox" name="remember"> Remember me
        </label>
        <a href="{{ url_for('contact') }}" style="font-size:0.94rem;">Need help?</a>
      </div>

      <button type="submit" class="btn btn--primary btn--block btn--lg">Log in</button>

      <p class="auth__alt">New here? <a href="{{ url_for('register') }}">Create an account</a></p>
    </form>
  </div>
</section>
{% endblock %}
